name: Packages

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-packages:
    name: Build packages (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install package tools
        run: cargo install cargo-deb cargo-generate-rpm

      - name: Test
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --release --locked

      - name: Build Debian package
        run: cargo deb --no-build

      - name: Build RPM package
        run: cargo generate-rpm

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sshknockd-packages-${{ matrix.arch }}
          path: |
            target/debian/*.deb
            target/generate-rpm/*.rpm

  publish-release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download package artifacts
        uses: actions/download-artifact@v6
        with:
          path: dist
          pattern: sshknockd-packages-*
          merge-multiple: true

      - name: Prepare release notes
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v version="${version}" '
            $0 ~ "^## \\[" version "\\]" { capture = 1; print; next }
            capture && $0 ~ "^## \\[" { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No CHANGELOG.md entry found for ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Sign package checksums
        env:
          RELEASE_SIGNING_KEY_PEM: ${{ secrets.RELEASE_SIGNING_KEY_PEM }}
        run: |
          if [ -z "${RELEASE_SIGNING_KEY_PEM}" ]; then
            echo "RELEASE_SIGNING_KEY_PEM secret is required"
            exit 1
          fi
          mapfile -t package_names < <(find dist -maxdepth 1 -type f \( -name '*.deb' -o -name '*.rpm' \) -printf '%f\n' | sort)
          if [ "${#package_names[@]}" -eq 0 ]; then
            echo "No packages found"
            exit 1
          fi
          (cd dist && sha256sum "${package_names[@]}") > dist/SHA256SUMS
          printf '%s\n' "${RELEASE_SIGNING_KEY_PEM}" > release-signing-key.pem
          openssl pkeyutl -sign -rawin \
            -inkey release-signing-key.pem \
            -in dist/SHA256SUMS \
            -out dist/SHA256SUMS.sig
          rm -f release-signing-key.pem

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -t packages < <(find dist -maxdepth 1 -type f \( -name '*.deb' -o -name '*.rpm' -o -name 'SHA256SUMS' -o -name 'SHA256SUMS.sig' \) | sort)
          if [ "${#packages[@]}" -eq 0 ]; then
            echo "No packages found"
            exit 1
          fi
          gh release create "${GITHUB_REF_NAME}" \
            "${packages[@]}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file release-notes.md
