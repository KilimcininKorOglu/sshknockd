name: Packages

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-packages:
    name: Build packages (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        # Pinned from actions/checkout@v6
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Validate release metadata
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          cargo_version="$(python3 -c 'import tomllib; print(tomllib.load(open("Cargo.toml", "rb"))["package"]["version"])')"
          if [ "${cargo_version}" != "${tag_version}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match Cargo.toml package version ${cargo_version}" >&2
            exit 1
          fi
          if ! grep -Eq "^## \\[${tag_version}\\]" CHANGELOG.md; then
            echo "CHANGELOG.md is missing release heading for ${tag_version}" >&2
            exit 1
          fi

      - name: Install Rust
        # Pinned from dtolnay/rust-toolchain@stable
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30

      - name: Install package tools
        run: cargo install cargo-deb cargo-generate-rpm

      - name: Test
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --release --locked

      - name: Validate compiled binary version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          binary_version="$(target/release/sshknockd version)"
          if [ "${binary_version}" != "${tag_version}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match compiled binary version ${binary_version}" >&2
            exit 1
          fi

      - name: Build Debian package
        run: cargo deb --no-build

      - name: Build RPM package
        run: cargo generate-rpm

      - name: Upload package artifacts
        # Pinned from actions/upload-artifact@v4
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: sshknockd-packages-${{ matrix.arch }}
          path: |
            target/debian/*.deb
            target/generate-rpm/*.rpm

  publish-release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        # Pinned from actions/checkout@v6
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Download package artifacts
        # Pinned from actions/download-artifact@v6
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53
        with:
          path: dist
          pattern: sshknockd-packages-*
          merge-multiple: true

      - name: Prepare release notes
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v version="${version}" '
            $0 ~ "^## \\[" version "\\]" { capture = 1; print; next }
            capture && $0 ~ "^## \\[" { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No CHANGELOG.md entry found for ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Sign package checksums
        env:
          RELEASE_SIGNING_KEY_PEM: ${{ secrets.RELEASE_SIGNING_KEY_PEM }}
        run: |
          if [ -z "${RELEASE_SIGNING_KEY_PEM}" ]; then
            echo "RELEASE_SIGNING_KEY_PEM secret is required"
            exit 1
          fi
          mapfile -t package_names < <(find dist -maxdepth 1 -type f \( -name '*.deb' -o -name '*.rpm' \) -printf '%f\n' | sort)
          if [ "${#package_names[@]}" -eq 0 ]; then
            echo "No packages found"
            exit 1
          fi
          (cd dist && sha256sum "${package_names[@]}") > dist/SHA256SUMS
          printf '%s\n' "${RELEASE_SIGNING_KEY_PEM}" > release-signing-key.pem
          openssl pkeyutl -sign -rawin \
            -inkey release-signing-key.pem \
            -in dist/SHA256SUMS \
            -out dist/SHA256SUMS.sig
          rm -f release-signing-key.pem

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -t packages < <(find dist -maxdepth 1 -type f \( -name '*.deb' -o -name '*.rpm' -o -name 'SHA256SUMS' -o -name 'SHA256SUMS.sig' \) | sort)
          if [ "${#packages[@]}" -eq 0 ]; then
            echo "No packages found"
            exit 1
          fi
          gh release create "${GITHUB_REF_NAME}" \
            "${packages[@]}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file release-notes.md
